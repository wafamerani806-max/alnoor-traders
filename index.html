<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Noor Traders | Premium Herbal Hair Care</title>
    <meta name="description" content="Premium herbal oils and hair tonics from Al Noor Traders, Layyah. Discover Nine Leaves Herbal Oil and Black Rose Hair Tonic.">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=Inter:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS (Play CDN) -->
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Alpine.js for Interactivity -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style type="text/tailwindcss">
        @theme {
            --font-serif: "Cormorant Garamond", serif;
            --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
            
            --color-brand-green: #2d4a22;
            --color-brand-olive: #5a5a40;
            --color-brand-cream: #f5f5f0;
        }

        @layer base {
            body {
                @apply bg-brand-cream text-gray-900 font-sans antialiased;
            }
        }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="appData()">
    <!-- Navigation -->
    <nav class="sticky top-0 z-50 bg-brand-cream/80 backdrop-blur-md border-b border-brand-olive/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-brand-green rounded-full flex items-center justify-center text-white font-serif font-bold">A</div>
                <span class="font-serif text-xl font-bold tracking-tight text-brand-green">Al Noor Traders</span>
            </div>
            <button 
                @click="openWhatsApp()"
                class="flex items-center gap-2 bg-brand-green text-white px-4 py-2 rounded-full text-sm font-medium hover:bg-opacity-90 transition-all"
            >
                <i data-lucide="phone" class="w-4 h-4"></i>
                <span class="hidden sm:inline">Contact Us</span>
            </button>
        </div>
    </nav>

    <main>
        <!-- Hero Section -->
        <section class="relative py-20 lg:py-32 overflow-hidden">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                <div class="max-w-3xl">
                    <div 
                        x-init="setTimeout(() => $el.classList.add('opacity-100', 'translate-y-0'), 100)"
                        class="opacity-0 translate-y-10 transition-all duration-1000 ease-out"
                    >
                        <span class="inline-block px-3 py-1 rounded-full bg-brand-olive/10 text-brand-olive text-xs font-semibold tracking-wider uppercase mb-6">
                            Premium Hair Care Solutions
                        </span>
                        <h1 class="font-serif text-5xl lg:text-7xl font-bold text-brand-green leading-[1.1] mb-8">
                            Natural Secret to <br />
                            <span class="italic text-brand-olive">Stronger, Silkier</span> Hair
                        </h1>
                        <p class="text-lg text-gray-600 mb-10 leading-relaxed max-w-xl">
                            Discover the power of nature with Al Noor Traders. Our herbal oils and tonics are crafted in Layyah to give your hair the nourishment it deserves.
                        </p>
                        <div class="flex flex-col sm:flex-row gap-4">
                            <button 
                                @click="openWhatsApp('Hello Al Noor Traders, I\'m interested in your hair care products.')"
                                class="flex items-center justify-center gap-3 bg-brand-green text-white px-8 py-4 rounded-full text-lg font-semibold hover:shadow-xl hover:-translate-y-1 transition-all group"
                            >
                                <i data-lucide="message-circle" class="w-6 h-6"></i>
                                Order via WhatsApp
                                <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-1 transition-transform"></i>
                            </button>
                            <a 
                                href="#products"
                                class="flex items-center justify-center gap-2 px-8 py-4 rounded-full text-lg font-semibold text-brand-green border border-brand-green/20 hover:bg-brand-green/5 transition-all"
                            >
